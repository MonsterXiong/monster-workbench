name: release

on:
  push:
    tags:
      - "v*"
      - "app-v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf zip

      - name: Install frontend dependencies
        run: npm ci

      - name: Get Release Notes
        id: release_notes
        shell: bash
        run: |
          if [ -f dist/release-notes.md ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat dist/release-notes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Monster Tools native desktop release." >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Monster Tools ${{ github.ref_name }}"
          releaseBody: "${{ steps.release_notes.outputs.body }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
