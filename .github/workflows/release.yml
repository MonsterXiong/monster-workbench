name: release

on:
  push:
    tags:
      - "v*"
      - "app-v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    permissions:
      contents: read

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}
          workspaces: |
            src-tauri -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Check architecture boundaries
        run: npm run check:architecture

      - name: Test AI sidecar contract
        run: npm run test:ai-sidecar

      - name: Stress test AI sidecar
        run: npm run test:ai-sidecar:stress

      - name: Test Rust AI service
        run: cargo test --manifest-path src-tauri/Cargo.toml ai_service

  build:
    permissions:
      contents: write

    needs: verify

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}
          workspaces: |
            src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf zip

      - name: Install frontend dependencies
        run: npm ci

      - name: Get Release Notes
        id: release_notes
        shell: bash
        run: |
          if [ -f .github/release-notes.md ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat .github/release-notes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Monster Tools native desktop release." >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app for release test
        if: github.event_name == 'workflow_dispatch' && !inputs.publish_release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build ${{ matrix.args }}

      - name: Build Tauri app and upload release
        if: github.event_name != 'workflow_dispatch' || inputs.publish_release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Monster Tools ${{ github.ref_name }}"
          releaseBody: "${{ steps.release_notes.outputs.body }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
